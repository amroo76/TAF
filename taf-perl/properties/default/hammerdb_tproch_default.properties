#
# PURPOSE:
#     Provide the default property values for the HammerDB TPROCH test suite.
#     These defaults define the baseline behavior for:
#         - HammerDB CLI execution
#         - TPC-H style workload configuration
#         - agent settings
#         - output and reporting toggles
#         - vendor-specific TPROCH extensions
#
# ARCHITECTURAL ROLE:
#     - Acts as the lowest-level configuration source for the HammerDB-TPROCH
#       test suite.
#     - Supplies deterministic defaults that TAF merges into %tsOpt via
#       TSParseProperty.
#     - Ensures consistent behavior across all environments unless overridden
#       by user properties or command-line options.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not contain user overrides.
#     - Does not auto-populate missing values (TAF handles that).
#     - Does not validate correctness of paths, executables, or DB settings.
#     - Does not configure HammerDB or the database itself.
#
# CONTRACT:
#     - All values in this file may be overridden by:
#           1. auto-populated values (special null handling)
#           2. user properties files
#           3. command-line options
#     - Users must not modify this file directly.
#     - All auto-populated paths default to locations under the TAF install
#       root (for example: taf-perl/tmp).
#
# GUARANTEES:
#     - All defaults are stable, deterministic, and safe for all supported
#       database engines.
#     - No vendor-specific extension is enabled by default.
#     - Reporting toggles default to "false" to avoid unnecessary output.
#
# REFERENCES:
#     TPC-H Benchmark:
#         https://www.tpc.org/tpch/
#     HammerDB Documentation (Steve Shaw):
#         https://www.hammerdb.com
#
# NOTES:
#     Do not modify defaults in this file.
#     To override any value, create a user properties file and pass it via:
#         --properties-file=<file>
#     or override individual keys via:
#         --hammerdb_tproch.<key>=<value>
#
# RESOLUTION ORDER:
#     1. TAF defaults (this file)
#     2. auto-populate (special null handling)
#     3. user properties file
#     4. command-line options
#############################################################################

# ---------------------------------------------------------------------------
# Executable and script locations
# ---------------------------------------------------------------------------

hammerdb_tproch.client_executable=client_source/hammerdb/HammerDB-5.0/hammerdbcli
hammerdb_tproch.client_script_dir=scripts/hammerdb
hammerdb_tproch.extra_args=

# ---------------------------------------------------------------------------
# Core identity and DB type
# ---------------------------------------------------------------------------

hammerdb_tproch.db_type=mariadb
hammerdb_tproch.test_client_version=5.0
hammerdb_tproch.self=HAMMERDB-TPROCH

# ---------------------------------------------------------------------------
# Agent settings
# ---------------------------------------------------------------------------

hammerdb_tproch.agent=client_source/hammerdb/HammerDB-5.0/agent/agent
hammerdb_tproch.agent_port=10001
hammerdb_tproch.agent_started_by_ts=true

# ---------------------------------------------------------------------------
# Common TPROCH workload options
# ---------------------------------------------------------------------------
hammerdb_tproch.scale=1
# While large, still small enough
hammerdb_tproch.safe_scale=100
# Allow scale > safe
hammerdb_tproch.allow_scale_gt_safe=false
# num_tpch_threads handled by TAF threads
hammerdb_tproch.total_querysets=1
hammerdb_tproch.update_sets=1
hammerdb_tproch.raise_query_error=false
hammerdb_tproch.verbose=false
hammerdb_tproch.refresh_on=false
hammerdb_tproch.trickle_refresh=1000
hammerdb_tproch.refresh_verbose=false

# ---------------------------------------------------------------------------
# Per test output format toggles
# ---------------------------------------------------------------------------

hammerdb_tproch.include_json_result=false
hammerdb_tproch.include_json_timing=false
hammerdb_tproch.include_json_metrics=false
hammerdb_tproch.include_html_result=false
hammerdb_tproch.include_html_timing=false
hammerdb_tproch.include_html_metrics=false

# ---------------------------------------------------------------------------
# Checksum toggles
# ---------------------------------------------------------------------------

hammerdb_tproch.checksum_after_setup=false
hammerdb_tproch.checksum_after_run=false

# ---------------------------------------------------------------------------
# Vendor-specific TPROCH extensions
# ---------------------------------------------------------------------------

# MariaDB
hammerdb_tproch.maria_storage_engine=INNODB
hammerdb_tproch.maria_cloud_query=false

# MySQL
hammerdb_tproch.mysql_ob_tenant_name=tpch
hammerdb_tproch.mysql_obcompat=false
hammerdb_tproch.mysql_ob_partition_num=1
hammerdb_tproch.mysql_storage_engine=innodb
hammerdb_tproch.mysql_cloud_query=false

# PostgreSQL
hammerdb_tproch.pg_tspace=pg_default
hammerdb_tproch.pg_gpcompat=false
hammerdb_tproch.pg_gpcompress=false
hammerdb_tproch.pg_degree_of_parallel=2
hammerdb_tproch.pg_rs_compat=false
hammerdb_tproch.pg_cloud_query=false

# SQL Server
hammerdb_tproch.mssqls_maxdop=2
hammerdb_tproch.mssqls_colstore=false
hammerdb_tproch.mssqls_use_bcp=true
hammerdb_tproch.mssqls_partition_orders_and_lineitems=false
hammerdb_tproch.mssqls_advanced_stats=false
hammerdb_tproch.mssqls_odbc_driver="ODBC Driver 17 for SQL Server"
hammerdb_tproch.mssqls_odbc_dsn=tpch_dsn
hammerdb_tproch.mssqls_cloud_query=false


###############################################################################
# End of hammerdb_tproch_default.properties
###############################################################################
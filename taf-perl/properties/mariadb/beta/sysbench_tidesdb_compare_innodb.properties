#############################################################################
# InnoDB Benchmark Properties — InnoDB vs TidesDB comparison
#
# Created: February 2026
# Version: 1.0
#
# This file is part of the Test Automation Framework (TAF).
# Copyright (c) 2025-2026 MariaDB Foundation
#
# Licensed under the GNU General Public License, version 2 or later (GPLv2+).
# See https://www.gnu.org/licenses/ for details.
#
# PURPOSE:
#     Run sysbench-lua OLTP workloads against MariaDB 12.2.2 using InnoDB.
#     Paired with benchmark_tidesdb.properties for engine comparison.
#
# USAGE:
#     # Build sysbench client (one-time):
#     perl taf.pl --prop=./properties/mariadb/beta/benchmark_innodb.properties \
#         --action=setup-client
#
#     # Run the full benchmark:
#     perl taf.pl --prop=./properties/mariadb/beta/benchmark_innodb.properties
#
# NOTES:
#     - MariaDB 12.2.2 installed at /usr/local/mariadb
#     - Data directory: /data/
#############################################################################

#############################################################################
# TAF SETTINGS (GLOBAL)
#############################################################################

## Action: initialize DB, start server, run tests, stop server
taf.action=init-start-db-run-tests

# Skip the running-DB-process check
taf.ignore_running_db_process=true

# Run description
taf.comments="InnoDB sysbench-lua OLTP benchmark (InnoDB vs TidesDB comparison)"

# Host
taf.host=localhost

#############################################################################
# TEST EXECUTION SETTINGS
#############################################################################

# Duration per thread-count iteration (seconds)
taf.duration=300

# Number of iterations per thread count
taf.iterations=3

# Test suite
taf.test_suite=sysbench-lua

# Run type
taf.test_type=adhoc

# Workloads to run
taf.tests=POINT_SELECT,OLTP_RO,OLTP_RW,INSERT

# Thread counts to sweep
taf.threads=1,2,4,8,16,32,64,128

# Warmup
taf.warmup_duration=120
taf.warmup_threads=64

#############################################################################
# TIMING CONTROLS
#############################################################################

taf.db_process_rest_enable=true
taf.db_process_rest_low=6
taf.db_process_rest_high=20

#############################################################################
# REPORT GENERATION
#############################################################################

taf.report_plugin=taf_res_raw_text.pm,text.pm,chart_and_test_info_results_tables_html.pm

#############################################################################
# DATABASE SETTINGS
#############################################################################

# Connect via UNIX socket
taf.db_clients_use_unix_socket=true

# MariaDB config file — InnoDB tuned
taf.db_config_file=./database_config_files/mariadb/mariadb_tidesdb_innodb_compare.cnf

# Database data directory
taf.db_data_dir=/data/mariadb

# MariaDB installation directory
taf.db_software_install_dir=/usr/local/mariadb

# Storage engine
taf.db_engine=InnoDB

#############################################################################
# SYSBENCH-LUA SETTINGS
#############################################################################

# MariaDB connector
sysbench_lua.db_driver=mariadb

# Table configuration
sysbench_lua.number_of_rows=1000000
sysbench_lua.number_of_tables=8

# Intermediate results (2 = detailed per-second output)
sysbench_lua.intermediate_result=2

#############################################################################
# SYSBENCH DEBUG
#############################################################################

sysbench_lua.debug_sysbench=false

# TAF debug
taf.tools_debug=true
taf.verbose=true

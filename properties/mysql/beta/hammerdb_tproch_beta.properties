# PURPOSE:
#     Provide an example user-level properties file for running the
#     HammerDB TPROC-H workload against MySQL under TAF. This file
#     demonstrates how to override default HammerDB-TPROCH settings
#     supplied by:
#         - hammerdb_tproch_default.properties
#         - auto-populated TAF runtime values
#         - command-line overrides
#
# ARCHITECTURAL ROLE:
#     - Acts as a user-override layer in the TAF configuration resolution
#       chain for HammerDB-TPROCH workloads.
#     - Provides a concrete, documented template for MySQL-specific
#       TPROC-H test configuration.
#     - Ensures that users override only the values they need without
#       modifying TAF defaults.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not define global defaults (see hammerdb_tproch_default.properties).
#     - Does not validate correctness of MySQL or HammerDB installation paths.
#     - Does not configure HammerDB or MySQL itself.
#     - Does not auto-populate missing values.
#
# CONTRACT:
#     - TAF merges properties in the following order:
#           1. TAF defaults
#           2. auto-populate (special null handling)
#           3. HammerDB-TPROCH defaults
#           4. user properties file (this file)
#           5. command-line overrides
#     - Users may override any property defined in the default file.
#     - All paths may be relative to the TAF root or absolute.
#
# GUARANTEES:
#     - All example lines below are preserved exactly as written.
#     - This file is safe to copy, modify, and use as a template.
#     - No defaults are modified here; only user-level overrides belong here.
#
# NOTES:
#     - HammerDBCLI and MySQL must be installed and running before executing
#       this test case.
#     - Refer to hammerdb_tproch_default.properties for default paths and
#       values that may require updating for your environment.
#     - This file is intentionally minimal; uncomment and override only the
#       values you need.
#
# EXAMPLE EXECUTION:
#     perl taf.pl --prop=./properties/mysql/hammerdb_tproch_user.properties
#############################################################################

#############################################################################
# TAF SETTINGS (GLOBAL)
#
# These settings control TAF behavior for this test run:
#     - what action to perform
#     - which report plugins to load
#     - which test suite to execute
#     - how many iterations and threads to run
#
# These settings apply only to this user properties file and override
# TAF defaults and test-suite defaults.
#############################################################################

# Action TAF should perform.
# Run "perl taf.pl --list-actions" for the full list.
taf.action=init-start-db-run-tests

# Comma-separated list of report plugins to run after the test.
taf.report_plugin=taf_res_raw_text.pm,text.pm,tproch_queries_chart.pm,chart_and_test_info_results_tables_html.pm

# Optional comment describing the purpose of this run.
taf.comments="Testing MySQL using HammerDB TPROC-H test suite"

#############################################################################
# TAF TEST EXECUTION SETTINGS
#############################################################################

# Number of iterations to run for each thread count.
taf.iterations=5

# Name of the test suite to load.
taf.test_suite=hammerdb-tproch

# Classification of this run.
# Valid values: adhoc, investigation, production, rerun, release
taf.test_type=adhoc

# Test case(s) from the suite to execute.
# hammerdb-tproch supports only: TPROCH
taf.tests=TPROCH

# Comma-separated list of thread counts to test.
taf.threads=1

#############################################################################
# TIMING CONTROLS
#############################################################################

# Sleep X seconds after test setup.
#taf.sleep_after_test_setup=60

# Sleep X seconds after test run.
#taf.sleep_after_test_run=60

# Turns on CPU-based rest detection for the DB process.
taf.db_process_rest_enable=true

# CPU percent at or below this value counts as "rest".
taf.db_process_rest_low=6

# CPU percent at or above this value resets the rest counter (DB not idle).
taf.db_process_rest_high=20

#############################################################################
# DATABASE SETTINGS
#
# These settings control how TAF locates, configures, and connects to the
# database under test. Any value left commented out will fall back to:
#     1. TAF defaults
#     2. auto-populated values (special null handling)
#     3. command-line overrides
#############################################################################

# Path to the MySQL configuration file to feed into mysqld.
# This must be a valid MySQL config file.
taf.db_config_file=./database_config_files/mysql/mysql_simple_2gbp.cnf

# Optional: directory where the database software has been unpacked.
# If omitted, TAF attempts to auto-detect the install directory.
# taf.db_software_install_dir=/home/taf-perl/database_software_installs/mysql-9.5.0-1.el8.x86_64.rpm-bundle/

# Whether to connect using a UNIX socket instead of TCP.
# true  = use socket
# false = use TCP (default)
taf.db_clients_use_unix_socket=true

# Optional overrides for database connection parameters.
# Uncomment only if you need to override TAF defaults.
# taf.database=test
# taf.engine=INNODB
# taf.db_user_pass=MariadbPass_@123
# taf.db_user=mariadb_tester
# taf.host=localhost
# taf.db_socket=/home/taf-perl/tmp/mysql.sock

#############################################################################
# HAMMERDB-TPROCH TEST SUITE SETTINGS
#
# These settings apply ONLY to the HammerDB-TPROCH test suite. They control:
#     - scale factor for the TPROC-H workload
#     - number of querysets (threads) used by HammerDB
#     - database type for TCL configuration
#     - checksum behavior
#     - per-iteration reporting output
#
# These values override the defaults in hammerdb_tproch_default.properties.
#############################################################################

# Scale factor for the TPROC-H workload.
hammerdb_tproch.scale=1

# Number of querysets to run.
hammerdb_tproch.total_querysets=1

# Database type used when generating HammerDB TCL configuration.
hammerdb_tproch.db_type=mysql

# Checksum after setup
hammerdb_tproch.checksum_after_setup=true

# Checksum after each run
hammerdb_tproch.checksum_after_run=true

#############################################################################
# REPORTING SETTINGS
#
# These toggles control which per-iteration HammerDB reports are generated.
# All reports are written into the "iterations" subdirectory of the results.
#############################################################################

# JSON reports.
hammerdb_tproch.include_json_timing=true
hammerdb_tproch.include_json_result=true
hammerdb_tproch.include_json_metrics=true

# HTML reports.
hammerdb_tproch.include_html_timing=true
hammerdb_tproch.include_html_result=true
hammerdb_tproch.include_html_metrics=true

##### TAF Debug #####
taf.tools_debug=true
taf.verbose=true
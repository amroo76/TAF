# Copyright (c) 2025 -2026  MariaDB Foundation
#
# Licensed under the GNU General Public License, version 2 or later (GPLv2+).
# See https://www.gnu.org/licenses/ for details.
#
# PURPOSE:
#     Provide an example user-level properties file for running the
#     HammerDB TPROC-C workload against MySQL under TAF. This file
#     demonstrates how users may override default HammerDB-TPROCC
#     configuration values supplied by:
#         - hammerdb_tprocc_default.properties
#         - auto-populated TAF runtime values
#         - command-line overrides
#
# ARCHITECTURAL ROLE:
#     - Acts as a user-override layer in the TAF configuration resolution
#       chain for HammerDB TPROC-C workloads.
#     - Provides a concrete, documented template for MySQL-specific
#       HammerDB TPROC-C test configuration.
#     - Ensures that users can safely override only the values they need
#       without modifying TAF defaults.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not define global defaults (see hammerdb_tprocc_default.properties).
#     - Does not validate property correctness.
#     - Does not auto-populate missing values.
#     - Does not configure HammerDB or MySQL itself.
#
# CONTRACT:
#     - Users may override any property defined in the default file by
#       placing the override here or passing it via:
#           --prop=<file>
#           --properties-file=<file>
#           --hammerdb_tprocc.<key>=<value>
#     - TAF merges properties in the following order:
#           1. TAF defaults
#           2. Auto-populated values (special null handling)
#           3. User properties file (this file)
#           4. Command-line overrides
#
# GUARANTEES:
#     - All example lines below are preserved exactly as written.
#     - This file is safe to copy, modify, and use as a template.
#     - No defaults are modified here; only user-level overrides belong here.
#
# NOTES:
#     - HammerDBCLI and MySQL must be installed and running before executing
#       this test case.
#     - Refer to hammerdb_tprocc_default.properties for default paths and
#       values that may require updating for your environment.
#     - This file is intentionally minimal; uncomment and override only the
#       values you need.
#
# EXAMPLE USAGE:
#     perl taf.pl --prop=./properties/mysql/beta/hammerdb_tprocc_beta.properties
#
# HOW TO USE THIS FILE:
#     This is a complete, working example of a user-level properties file
#     for the HammerDB-TPROCC test suite. Every setting below demonstrates
#     one of the following:
#         - a TAF-level override
#         - a database configuration override
#         - a test-suite-specific override
#         - a HammerDB-specific override
#     Use this file as a reference when creating your own properties file.
#     Only override the values you need; leave all others commented out.
#############################################################################

#############################################################################
# TAF SETTINGS (GLOBAL)
#
# These settings control the behavior of TAF itself:
#     - what action to perform
#     - which report plugins to load
#     - which database config file to use
#     - how TAF connects to the database
#
# These settings apply to ALL test suites, not only HammerDB.
#############################################################################

# Action TAF should perform.
taf.action=init-start-db-run-tests

# Report plugins (text, csv, json, chart_html)
taf.report_plugin=taf_res_raw_text.pm,text.pm,chart_and_test_info_results_tables_html.pm

# Optional comment describing the purpose of this run.
taf.comments="Testing MySQL using HammerDB TPROC-C test suite"

#############################################################################
# TEST EXECUTION SETTINGS
#############################################################################

# Duration of the workload in minutes.
taf.duration=3

# Number of iterations per thread count
taf.iterations=3

# Test suite to load
taf.test_suite=hammerdb-tprocc

# Classification of this run.
# Valid values: adhoc, investigation, production, rerun, release
taf.test_type=adhoc

# Test case(s) from the suite to execute.
# hammerdb-tprocc supports only: tprocc
taf.tests=tprocc

# Comma-separated list of thread counts to test.
taf.threads=10,20,30

# Duration of HammerDB cache warmup in minutes.
taf.warmup_duration=1

#############################################################################
# TIMING CONTROLS
#############################################################################

# Sleep X seconds after test setup.
#taf.sleep_after_test_setup=60

# Sleep X seconds after test run.
#taf.sleep_after_test_run=60

# Turns on CPU-based rest detection for the DB process.
taf.db_process_rest_enable=true

# CPU percent at or below this value counts as "rest".
taf.db_process_rest_low=6

# CPU percent at or above this value resets the rest counter (DB not idle).
taf.db_process_rest_high=20

#############################################################################
# DATABASE SETTINGS
#
# These settings control how TAF locates, configures, and connects to the
# database under test. They apply to any test suite that uses a MySQL or
# MySQL-family server.
#
# These values override TAF defaults. Any value left commented out will fall
# back to:
#     1. TAF defaults
#     2. auto-populated values (special null handling)
#     3. command-line overrides
#############################################################################

# Path to the MySQL configuration file to feed into mysqld.
# This must be a valid MySQL config file.
taf.db_config_file=./database_config_files/mysql/mysql_simple_2gbp.cnf

# Optional: directory where the database software has been unpacked.
# If omitted, TAF attempts to auto-detect the install directory.
# taf.db_software_install_dir=/home/jeb/taf-perl/database_software_installs/mysql-9.5.0-1.el8.x86_64.rpm-bundle/

# Whether to connect using a UNIX socket instead of TCP.
# true  = use socket
# false = use TCP (default)
taf.db_clients_use_unix_socket=true

# Optional overrides for database connection parameters.
# Uncomment only if you need to override TAF defaults.
# taf.database=test
# taf.engine=INNODB
# taf.db_user_pass=MariadbPass_@123
# taf.db_user=mariadb_tester
# taf.host=localhost
# taf.db_socket=/home/jeb/taf-perl/tmp/mysql.sock

#############################################################################
# HAMMERDB-TPROCC TEST SUITE SETTINGS
#
# These settings apply ONLY to the HammerDB-TPROCC test suite.
# They control:
#     - warehouse count
#     - database type for TCL generation
#     - checksum behavior
#     - which HammerDB reports to include
#
# These override the defaults in hammerdb_tprocc_default.properties.
#############################################################################

# Number of warehouses to set up and load
hammerdb_tprocc.number_of_warehouses=10

# What database type do we create TCL configuration for?
hammerdb_tprocc.db_type=mysql

# Checksum after setup
hammerdb_tprocc.checksum_after_setup=true

# Checksum after each run
hammerdb_tprocc.checksum_after_run=true

# HammerDB reports per iteration
# Reports are found in iterations sub results directory

# JSON reports
hammerdb_tprocc.include_json_tcount=true
hammerdb_tprocc.include_json_timing=true
hammerdb_tprocc.include_json_result=true
hammerdb_tprocc.include_json_metrics=true

# HTML reports
hammerdb_tprocc.include_html_tcount=true
hammerdb_tprocc.include_html_timing=true
hammerdb_tprocc.include_html_result=true
hammerdb_tprocc.include_html_metrics=true

##### TAF Debug #####
taf.tools_debug=true
taf.verbose=true
## --------------------------------------------------------------------------
## Action & Lifecycle
## --------------------------------------------------------------------------
taf.action                 = run-tests
taf.sleep_after_test_setup = 2
taf.verbose                = true
taf.comments               = "Baseline execution of the olestest error case in test_suite_template"

## --------------------------------------------------------------------------
## Execution Parameters
## --------------------------------------------------------------------------
taf.duration               = 10
taf.iterations             = 2
taf.tests                  = olestest
taf.threads                = 256,512
taf.test_suite             = test_suite_template

## --------------------------------------------------------------------------
## Client Arguments
## --------------------------------------------------------------------------
test_suite_template.load_args   = "--rows=100000"
test_suite_template.client_args = "--example --how --to --pass"
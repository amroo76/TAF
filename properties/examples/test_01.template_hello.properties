## --------------------------------------------------------------------------
## Action & Lifecycle
## --------------------------------------------------------------------------
taf.action                 = run-tests
taf.sleep_after_test_setup = 20
taf.verbose                = true
taf.comments               = "Baseline execution of the test_suite_template suite"

## --------------------------------------------------------------------------
## Execution Parameters
## --------------------------------------------------------------------------
taf.duration               = 10
taf.iterations             = 3
taf.tests                  = HelloWorld
taf.threads                = 256,512
taf.test_suite             = test_suite_template

## --------------------------------------------------------------------------
## Client Arguments
## --------------------------------------------------------------------------
test_suite_template.client_args = "--example --how --to --pass"
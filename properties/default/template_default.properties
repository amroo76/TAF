# PURPOSE:
#     Provide the default property values for the test_suite_template
#     test suite. This file serves as a reference implementation for
#     new test suites and demonstrates how to structure default
#     properties for:
#         - client executable and arguments
#         - load and cleanup behavior
#         - default duration and version metadata
#
# ARCHITECTURAL ROLE:
#     - Acts as the lowest-level configuration source for the
#       test_suite_template test suite.
#     - Serves as a template for authors of new test suites, showing
#       how to define default properties in a TAF-compliant way.
#     - Ensures that example defaults are deterministic and safe to
#       override in user properties files.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not contain user overrides.
#     - Does not validate property correctness.
#     - Does not auto-populate missing values (TAF handles that).
#     - Does not configure any real client or database by itself.
#
# CONTRACT:
#     - All values in this file may be overridden by:
#           1. auto-populated values (special null handling)
#           2. user properties files
#           3. command-line options
#     - Users must not modify this file directly.
#
# GUARANTEES:
#     - All defaults are stable and deterministic.
#     - This file can be safely copied and adapted when creating new
#       test suite default property files.
#
# NOTES:
#     Do not modify defaults in this file.
#     To override any value, create a user properties file and pass it via:
#         --properties-file=<file>
#     or override individual keys via:
#         --test_suite_template.<key>=<value>
#
# RESOLUTION ORDER:
#     1. TAF defaults (global defaults file)
#     2. test suite defaults (this file)
#     3. auto-populate (special null handling)
#     4. user properties file
#     5. command-line options
###############################################################################

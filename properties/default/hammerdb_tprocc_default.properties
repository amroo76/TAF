# PURPOSE:
#     Provide the default property values for the HammerDB TPROCC test suite.
#     These defaults define the baseline behavior for:
#         - HammerDB CLI execution
#         - workload configuration
#         - agent settings
#         - logging and reporting
#         - DB-specific extensions
#
# ARCHITECTURAL ROLE:
#     - Acts as the lowest-level configuration source for the HammerDB-TPROCC
#       test suite.
#     - Supplies deterministic defaults that TAF merges into %tsOpt via
#       TSParseProperty.
#     - Ensures consistent behavior across all environments unless overridden
#       by user properties or command-line options.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not contain user overrides.
#     - Does not auto-populate missing values (TAF handles that).
#     - Does not validate correctness of paths or executables.
#     - Does not configure HammerDB or the database itself.
#
# CONTRACT:
#     - All values in this file may be overridden by:
#           1. auto-populated values (special null handling)
#           2. user properties files
#           3. command-line options
#     - Users must not modify this file directly.
#     - All paths default to locations under the TAF installation root
#       when auto-populated (for example: taf-perl/tmp).
#
# GUARANTEES:
#     - All defaults are stable, deterministic, and safe for all supported
#       database engines.
#     - No DB-specific extension is enabled by default.
#     - Reporting options default to "false" to avoid unnecessary output.
#
# REFERENCES:
#     TPC-C Benchmark:
#         https://www.tpc.org/tpcc/
#     HammerDB Documentation (Steve Shaw):
#         https://www.hammerdb.com/
#
# NOTES:
#     Do not modify defaults here.
#     To override any value, create a user properties file and pass it via:
#         --properties-file=<file>
#     or override individual keys via:
#         --hammerdb_tprocc.<key>=<value>
#
# RESOLUTION ORDER:
#     1. TAF defaults (this file)
#     2. auto-populate (special null handling)
#     3. user properties file
#     4. command-line options
#############################################################################

# -----------------------------------------------------------------------------
# Executable and script locations
# -----------------------------------------------------------------------------

# Path to the HammerDB CLI executable (relative to taf-perl root)
hammerdb_tprocc.client_executable=client_source/hammerdb/HammerDB-5.0/hammerdbcli

# Directory containing HammerDB Tcl scripts
hammerdb_tprocc.client_script_dir=scripts/hammerdb

# Optional: extra args passed to hammerdbcli (e.g. --trace)
hammerdb_tprocc.extra_args=

# -----------------------------------------------------------------------------
# Workload defaults
# -----------------------------------------------------------------------------

# Number of warehouses to simulate
hammerdb_tprocc.number_of_warehouses=10

# Default test duration in seconds (used if taf.duration not set)
# Comes from taf.duration

# MariaDB, MySQL, PostgresSQL, etc...
hammerdb_tprocc.db_type=maria

# Default ramp-up time in seconds
hammerdb_tprocc.default_rampup=60

# Optional: default duration fallback for GetTestDuration
hammerdb_tprocc.default_duration=120

# -----------------------------------------------------------------------------
# Agent settings
# -----------------------------------------------------------------------------

# Agent path used for metrics
hammerdb_tprocc.agent=client_source/hammerdb/HammerDB-5.0/agent/agent

# Port to use with agent
hammerdb_tprocc.agent_port=10001

# Are we launching agent, or connecting to remote?
hammerdb_tprocc.agent_started_by_ts=true

# -----------------------------------------------------------------------------
# Client version metadata
# -----------------------------------------------------------------------------

# Optional: version string for client (filled in by TS if not set)
hammerdb_tprocc.test_client_version=HammerDB-5.0

# -----------------------------------------------------------------------------
# Checksum
# -----------------------------------------------------------------------------

# Checksum after load/setup
hammerdb_tprocc.checksum_after_setup=false

# Checksum after an iteration
hammerdb_tprocc.checksum_after_run=false

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# when debugging or running interactively with few threads
hammerdb_tprocc.show_out_put=0

#Redirect each vuser's output to a tmp file instead of the console
hammerdb_tprocc.log_to_temp=0

# -----------------------------------------------------------------------------
# HTML/JSON # When TRUE, files are created in iterations sub results directory.
# -----------------------------------------------------------------------------

# Produce json tcount file from iteration's results.
hammerdb_tprocc.include_json_tcount=false

# Produce json timing file from iteration's results.
hammerdb_tprocc.include_json_timing=false

# Produce json results file from iteration's results.
hammerdb_tprocc.include_json_result=false

# Produce json metrics file from iteration's results.
hammerdb_tprocc.include_json_metrics=false

# Produce html tcount file from iteration's results.
hammerdb_tprocc.include_html_tcount=false

# Produce html timing file from iteration's results.
hammerdb_tprocc.include_html_timing=false

# Produce html results file from iteration's results.
hammerdb_tprocc.include_html_result=false

# Produce html metrics file from iteration's results.
hammerdb_tprocc.include_html_metrics=false

###############################################################################
# TPROCC workload defaults (applies to all DBs)
###############################################################################

hammerdb_tprocc.driver=timed
hammerdb_tprocc.total_iterations=100000000
hammerdb_tprocc.raiseerror=false
hammerdb_tprocc.keyandthink=false
hammerdb_tprocc.allwarehouse=false
hammerdb_tprocc.timeprofile=true
hammerdb_tprocc.async_scale=false
hammerdb_tprocc.async_client=10
hammerdb_tprocc.async_verbose=false
hammerdb_tprocc.async_delay=1000
hammerdb_tprocc.connect_pool=false

###############################################################################
# MariaDB-specific extensions (not used by other DBs)
###############################################################################

hammerdb_tprocc.maria_partition=false
hammerdb_tprocc.maria_prepared=false
hammerdb_tprocc.maria_no_stored_procs=false
hammerdb_tprocc.maria_history_pk=false
hammerdb_tprocc.maria_purge=false

###############################################################################
# MySQL-specific extensions (not used by other DBs)
###############################################################################

hammerdb_tprocc.mysql_partition=false
hammerdb_tprocc.mysql_prepared=false
hammerdb_tprocc.mysql_no_stored_procs=false
hammerdb_tprocc.mysql_history_pk=false

###############################################################################
# PostgreSQL-specific extensions (not used by other DBs)
###############################################################################

hammerdb_tprocc.pg_partition=false
hammerdb_tprocc.pg_storedprocs=false
hammerdb_tprocc.pg_vacuum=false
hammerdb_tprocc.pg_dritasnap=false
hammerdb_tprocc.pg_oracompat=false
hammerdb_tprocc.pg_cituscompat=false

###############################################################################
# MSSQL-specific extensions (not used by other DBs)
###############################################################################
hammerdb_tprocc.mssqls_imdb=false
hammerdb_tprocc.mssqls_bucket=1
hammerdb_tprocc.mssqls_durability=SCHEMA_AND_DATA
hammerdb_tprocc.mssqls_use_bcp=true
hammerdb_tprocc.mssqls_checkpoint=false

###############################################################################
# End of hammerdb-tprocc_default.properties

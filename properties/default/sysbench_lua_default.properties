# See https://www.gnu.org/licenses/ for details.
#
# PURPOSE:
#     Provide the default property values for all sysbench-lua workloads and
#     BMK-style benchmarks executed under TAF. These defaults form the base
#     configuration layer for any test suite that relies on sysbench-lua.
#
# ARCHITECTURAL ROLE:
#     - Acts as the lowest-level property source in the TAF configuration
#       resolution chain.
#     - Supplies stable, deterministic defaults for all sysbench-lua workloads.
#     - Ensures that missing or null values can be auto-populated by TAF
#       during runtime (for example: paths, ports, temp directories).
#     - Provides a consistent baseline across all environments, platforms,
#       and user configurations.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not override user-specified properties.
#     - Does not validate property correctness.
#     - Does not perform dynamic substitution or environment expansion.
#     - Does not contain host-specific or workload-specific overrides.
#
# CONTRACT:
#     - These values are merged into %tsOpt by TSParseProperty.
#     - Any property defined here may be overridden by:
#           1. auto-populated values (special null handling)
#           2. user properties file (--properties-file=<file>)
#           3. command-line options (--key=value)
#     - Users must not modify this file directly.
#
# GUARANTEES:
#     - All defaults are stable, deterministic, and safe for all sysbench-lua
#       workloads.
#     - Auto-populated paths default to locations under the TAF installation
#       root (for example: taf-perl/tmp).
#     - Resolution order is explicit and contributor-proof.
#
# REFERENCES:
#     Sysbench (Alexey Kopytov):
#         https://github.com/akopytov/sysbench
#     BMK (Dimitri Kravtchuk):
#         http://dimitrik.free.fr/BMK/
#
# NOTES:
#     Do not modify defaults in this file.
#     To override any property:
#         - Create a user properties file with the desired values, OR
#         - Pass overrides via command-line options.
#
# RESOLUTION ORDER:
#     1. TAF defaults (this file)
#     2. auto-populate (special null handling)
#     3. user properties file
#     4. command-line options
#############################################################################

# ---------------------------------------------------------------------------
# Core identity
# ---------------------------------------------------------------------------
sysbench_lua.self                  = SYSBENCH-LUA
sysbench_lua.test_client_version   = 1.1.0
sysbench_lua.source                = client_source/sysbench-lua/
sysbench_lua.exe                   = client_source/sysbench-lua/sysbench
sysbench_lua.lua_scripts_dir       = client_source/sysbench-lua/src/lua
sysbench_lua.connector             = C-API
sysbench_lua.db_driver             = mariadb
sysbench_lua.db_ps_mode            = auto

# ---------------------------------------------------------------------------
# Defaults for workload
# ---------------------------------------------------------------------------
sysbench_lua.def_duration          = 300
sysbench_lua.def_engine            = INNODB
sysbench_lua.def_myisam_rows       = 1000000
sysbench_lua.def_rows              = 1000000
sysbench_lua.def_threads           = 8,16,32,64,128,246,512,1024
sysbench_lua.intermediate_result   = null
sysbench_lua.number_of_tables      = 1
sysbench_lua.number_of_partitions  = null
sysbench_lua.number_of_rows        = 10000
sysbench_lua.range_size            = 100
sysbench_lua.thread_init_timeout   = 0
sysbench_lua.create_table_options  = null

# ---------------------------------------------------------------------------
# OLTP workload knobs
# ---------------------------------------------------------------------------
sysbench_lua.oltp_skip_trx         = on
sysbench_lua.auto_inc              = on
sysbench_lua.oltp_lua_script       = oltp_read_only.lua
sysbench_lua.oltp_point_selects    = 10
sysbench_lua.oltp_simple_ranges    = 1
sysbench_lua.oltp_sum_ranges       = 1
sysbench_lua.oltp_order_ranges     = 1
sysbench_lua.oltp_distinct_ranges  = 1
sysbench_lua.oltp_index_updates    = 1
sysbench_lua.oltp_non_index_updates= 1
sysbench_lua.oltp_del_ins          = 1
sysbench_lua.oltp_dist_type        = uniform

# ---------------------------------------------------------------------------
# Error handling / shutdown
# ---------------------------------------------------------------------------
sysbench_lua.error_log             = null
sysbench_lua.forced_shutdown       = 1
sysbench_lua.forced_shutdown_sec   = 0
sysbench_lua.pre_test_done         = false

# ---------------------------------------------------------------------------
# Build / compile
# ---------------------------------------------------------------------------
sysbench_lua.cmake_args            = -DWITH_MYSQL=on -DCMAKE_BUILD_TYPE=Release

# ---------------------------------------------------------------------------
# Debugging
# ---------------------------------------------------------------------------
sysbench_lua.debug_sysbench = false
sysbench_lua.debug_full_sysbench = false

# ---------------------------------------------------------------------------
# BMK integration
# ---------------------------------------------------------------------------
sysbench_lua.use_bmk               = false
sysbench_lua.bmk_archive           = external_tools/BMK-kit.tgz
sysbench_lua.bmk_install           = client_source/BMK/
sysbench_lua.bmk_exe               = client_source/BMK/sysbench-1.1-mysql80-ssl111L-x64
sysbench_lua.bmk_libs              = client_source/BMK/lib-ssl111L-x64
sysbench_lua.bmk_lua_scripts_dir   = client_source/BMK/sb_exec/lua
sysbench_lua.bmk_source            = ./client_source/BMK/sb_exec/lua
sysbench_lua.bmk_prepare_threads   = 8
sysbench_lua.bmk_by_sec_index      = 0
sysbench_lua.bmk_update_range_size = 0
sysbench_lua.bmk_reconnect         = null
sysbench_lua.bmk_mysql_ssl         = null
sysbench_lua.bmk_check_character_set= null
sysbench_lua.bmk_partitions        = null
sysbench_lua.number_of_partition   = null
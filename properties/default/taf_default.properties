# PURPOSE:
#     Define the global default property values for the Test Automation
#     Framework (TAF). These defaults apply to all test suites, all
#     database engines, and all workloads unless explicitly overridden.
#
# ARCHITECTURAL ROLE:
#     - Acts as the lowest-level configuration source for the entire
#       framework.
#     - Provides stable, deterministic defaults for:
#           * framework behavior
#           * database configuration
#           * connection settings
#           * test execution parameters
#     - Ensures that missing or null values can be auto-populated by TAF
#       during runtime (for example: paths, ports, directories).
#     - Establishes a consistent baseline across all environments and
#       platforms.
#
# WHAT THIS FILE DOES NOT DO:
#     - Does not contain user overrides.
#     - Does not validate property correctness.
#     - Does not perform dynamic substitution or environment expansion.
#     - Does not contain test-suite-specific or workload-specific settings.
#
# CONTRACT:
#     - These values are merged into %tsOpt by TSParseProperty.
#     - Any property defined here may be overridden by:
#           1. auto-populated values (special null handling)
#           2. user properties file (--properties-file=<file>)
#           3. command-line options (--key=value)
#     - Users must not modify this file directly.
#
# GUARANTEES:
#     - All defaults are stable, deterministic, and safe for all supported
#       test suites and database engines.
#     - Auto-populated paths default to locations under the TAF installation
#       root (for example: taf-perl/tmp).
#     - Resolution order is explicit and contributor-proof.
#
# NOTES:
#     Do not modify defaults in this file.
#     To override any property:
#         - Create a user properties file with the desired values, OR
#         - Pass overrides via command-line options.
#
#     Use "perl taf.pl --help" for more information on available options.
#
# RESOLUTION ORDER:
#     1. TAF defaults (this file)
#     2. auto-populate (special null handling)
#     3. user properties file
#     4. command-line options
#############################################################################

###############################################################################
# Framework Properties
###############################################################################
# action  # see "perl taf.pl --list-actions"
taf.action=null

# What host to archive result files on
taf.archive_host=localhost

# What path to store the result files
# null means unset; TAF will resolve to defaults at runtime taf-perl/archive
taf.archive_path=null

# Run comments
taf.comments=null

# Compress archived results
taf.compress_archive=false

# Cmake location
taf.cmake_path=/usr/bin/cmake

# What to do with database every iteration preserve | restart | reset | restore
taf.database_iteration_mode=preserve

# Where to store db restore image, default taf-root/db_image
taf.database_restore_image_dir=null

# Format (copy, tar, tar.gz)
taf.restore_image_format=copy

# List of ENV to set i.e. =ENV;value,ENV;value
taf.environment_variables=null

# The host running this test
# TAF will resolve to hostname at runtime if localhost
taf.host=localhost

# Framework logs (not DB error log)
# null means unset; TAF will resolve to defaults at runtime taf-perl/logs
taf.logs_dir=null

# Password for test host
taf.pass=null

# Where generated reports are stored after generation.
# null means unset; TAF will resolve to defaults at runtime taf-perl/reports
taf.reports_directory=null

# Reporter plug-in
taf.report_plugin=text.pm

# Report generator on (true - default) / off (false)
taf.generate_report=true

# Were the results dirs get created
# null means unset; TAF will resolve to defaults at runtime taf-perl/results
taf.results_root_dir=null

# Sleep X seconds after test setup
taf.sleep_after_test_setup=0

# Sleep X seconds after test run
taf.sleep_after_test_run=0

# Sleep X seconds before test run
taf.sleep_before_test_run=0

# Temp dir to use. null = tmp
# TAF will auto populate if null at run time taf-perl/tmp
taf.tmp_dir=null

# user                    # User name for test host
taf.user=null

###############################################################################
# Framework Flags
###############################################################################

# Controls only 1 taf running at a time
taf.exit_if_test_lock_exists=false

# Run warmup iteration at start
taf.include_warmup_iteration=false

# TAF will skip checking for funning database process if set to true.
taf.ignore_running_db_process=false

# Use to skip calling BuildClients during "setup" actions
taf.skip_client_builds=false

# Use to leave database up and running
taf.skip_database_shutdown=false

# Use to skip calling TestCleanup. Cleanup after current test case
taf.skip_test_cleanup=false

# Skip Test Post
taf.skip_test_post=false

# Skip test suite clean up
taf.skip_test_suite_cleanup=false

# tools debugging 
taf.tools_debug=false

# Turn durations into request for some test suite
taf.use_request_based=false

# verbose              # flag printing a bunch of stuff to stdout
taf.verbose=false

###############################################################################
# DB Properties
###############################################################################

#################
# DB Main       #
#################

# mariadb, mysql, etc...
taf.taf_db_makers_plugin=null

# database tests are to use
taf.database=test

# Database configuration file path/filename
taf.db_config_file=null

# Where database tables/files go
# null means unset; TAF will resolve to defaults at runtime taf-perl/data
taf.db_data_dir=null

# engine engine to use
taf.db_engine=InnoDB

# Extra args to pass to database init/start
taf.db_extra_args=null

# Where to look for plugins if needed
taf.db_plugin_dir=null

# Archive package to be installed  /path/to/db_install[,/path/to/client,....]
# (tar,tar.gz,etc.)
taf.db_software_install_packages=null

# database software install location for database under test
taf.db_software_install_dir=null

# Root directory for all database software install location
# Will auto populate if null at run time
taf.db_software_install_root_dir=null

# Seconds to wait after issuing database start
taf.db_start_wait=90

# Seconds to wait after issuing database stop
taf.db_stop_wait=120

# Where database logs used for processing go (eg redo/undo) 
# Note: default db_data_dir 
# Note: Non of current db plugins use. Here for expansion. 
taf.db_trans_logs_dir=null

# Bind db to certan cpu's
taf.db_task_set=null

#################
# DB Connection #
#################
# Tells clients to use unix socket file for connection over port.
taf.db_clients_use_unix_socket=true

# port for db connect
taf.db_port=null

# db admin user
taf.db_root_user=root

# Password for root user.
# Override in user properties for production
taf.db_root_pass=MariadbPass_@123

# Unix Socket File for db connection
taf.db_socket=null

# off | prefer | require | verify_ca | verify_identity
taf.db_ssl_mode=off

# /path/to/ca.pem
taf.db_ssl_ca=null

# /path/to/client-cert.pem
taf.db_ssl_cert=null 

# /path/to/client-key.pem
taf.db_ssl_key=null

# /path/to/crl.pem (optional)
taf.db_ssl_crl=null

# <cipher list> (optional)
taf.db_ssl_cipher=null

# Native password for some MySQL and MariaDB.
taf.db_use_native_for_passwords=false

# password to use for db user
# Override in user properties for production
taf.db_user_pass=MariadbPass_@123

# What's the db user name
taf.db_user=mariadb_tester

# The permissions granted to users
taf.db_user_permissions=SELECT,INSERT,UPDATE,DELETE,CREATE,DROP,INDEX,ALTER,SHOW DATABASES,CREATE TEMPORARY TABLES,LOCK TABLES,EXECUTE,SHOW VIEW,CREATE VIEW,CREATE ROUTINE,REFERENCES

#############################################################################
# Script Files execution (shell/perl/etc) run stand alone scripts
###############################################################################

# Before the database is started <path/to/script/file> 
taf.exec_script_file_before_db_start=null

# After the database is started <path/to/script/file> 
taf.exec_script_file_after_db_start=null

# Before the run iteration <path/to/script/file> 
taf.exec_script_file_before_run_iter=null

# After the run iteration <path/to/script/file> 
taf.exec_script_file_after_run_iter=null

###############################################################################
# SQL Files execution
###############################################################################

# Before test setup <path/to/sql/file> 
taf.exec_sql_file_before_test_setup=null

# After test setup <path/to/sql/file> 
taf.exec_sql_file_after_test_setup=null

# Before run iteration <path/to/sql/file> 
taf.exec_sql_file_before_run_iter=null

# After run iteration <path/to/sql/file> 
taf.exec_sql_file_after_run_iter=null

###############################################################################
# Test Properties
###############################################################################
# duration      # How long to run test.
taf.duration=null

# Instances      # number of client instances a TS should spawn
taf.instances=0

# iterations    # number of iterations to run the test(s)
taf.iterations=1

# test_suite    # What TS are we going to use? no defaults defined!
taf.test_suite=null

# test_type     
taf.test_type=adhoc

# tests         # comma delim list of tests to run
taf.tests=null

# Test setup mode (skip | once | per_test | per_iter)
taf.test_setup_mode=once

# threads       # command delim list of threads to run
taf.threads=null

# warmup_threads
taf.warmup_threads=1

# warmup_duration  # How log to run warmup
taf.warmup_duration=100

###############################################################################
#  DB Process Watch Properties
#  These properties control the optional CPU based rest detection used to
#  determine when the database process has reached a stable idle state.
###############################################################################

# Enable or disable CPU\u2011based rest detection for the DB process.
taf.db_process_rest_enable=false

# CPU percent considered "at rest". Samples at or below this value count
# toward the required consecutive rest threshold.
taf.db_process_rest_low=5

# CPU percent that forces a reset of the rest counter. Samples at or above
# this value indicate the process is still active.
taf.db_process_rest_high=20

# Number of consecutive "at rest" samples required before the DB process
# is considered fully idle.
taf.db_process_rest_consecutive=10

# Maximum number of sampling cycles before giving up and reporting that
# the DB process did not reach a rest state.
taf.db_process_rest_max_attempts=200

# Seconds to sleep between sampling cycles (in addition to the 1\u2011second
# CPU sampling window used internally).
taf.db_process_rest_interval=2

#############################################################################
# ProfilingSection
#
# PURPOSE:
#     Default profiling options for TAF. These settings control whether
#     profiling is enabled, which profiler library is used, and how the
#     profiler behaves during each iteration. All values may be overridden
#     by user-level properties files or command-line options.
#
# NOTES:
#     - Profiling is disabled by default.
#     - profiler_lib must be set explicitly when profiling is enabled.
#     - All timing values are in seconds.
#     - Profiler output is always written to the iteration's sub-results
#       directory; no user-specified output directory is required.
#############################################################################

# Enable or disable profiling (false = disabled, true = enabled)
taf.profiler_enabled=false

# Duration of profiling (seconds) for duration mode
taf.profiler_duration=0

# Profiler library to load (example: taf-perf)
taf.profiler_lib=taf-perf

# Delay before profiling begins (seconds)
taf.profiler_start_delay=0

# The unit time the test suite uses for duration min/sec
taf.profiler_ts_duration_unit=sec

# Run profiler in continuous mode (false = duration mode, true = continuous mode)
taf.profiler_continuous=false

# Profiler-specific option string (interpreted by the selected profiler module)
taf.profiler_opts=-e cpu-clock:pp --call-graph fp

# Generate a human-readable report after profiling (false/true)
taf.profiler_generate_report=false

# Generate raw stack-trace data suitable for flamegraph tools (false/true)
taf.profiler_generate_flamegraph=false
# PURPOSE:
#     Run sysbench-lua OLTP workloads against MariaDB 12.2.2 using TidesDB.
#     Paired with benchmark_innodb.properties for engine comparison.
#
# USAGE:
#     # Build sysbench client (one-time, skip if already built for InnoDB):
#     perl taf.pl --prop=./properties/mariadb/beta/benchmark_tidesdb.properties \
#         --action=setup-client
#
#     # Run the full benchmark:
#     perl taf.pl --prop=./properties/mariadb/beta/benchmark_tidesdb.properties
#
# NOTES:
#     - MariaDB 12.2.2 with TidesDB v8.5.3 plugin at /usr/local/mariadb
#     - Data directory: /data/
#     - The TidesDB plugin (ha_tidesdb.so) must be in /usr/local/mariadb/lib/plugin/
#############################################################################

#############################################################################
# TAF SETTINGS (GLOBAL)
#############################################################################

## Action: initialize DB, start server, run tests, stop server
taf.action=init-start-db-run-tests

# Skip the running-DB-process check
taf.ignore_running_db_process=true

# Run description
taf.comments="TidesDB sysbench-lua OLTP benchmark (InnoDB vs TidesDB comparison)"

# Host
taf.host=localhost

#############################################################################
# TEST EXECUTION SETTINGS
#############################################################################

# Duration per thread-count iteration (seconds)
taf.duration=300

# Number of iterations per thread count
taf.iterations=3

# Test suite
taf.test_suite=sysbench-lua

# Run type
taf.test_type=adhoc

# Workloads to run
taf.tests=POINT_SELECT,OLTP_RO,OLTP_RW,INSERT

# Thread counts to sweep
taf.threads=1,2,4,8,16,32,64,128

# Warmup
taf.warmup_duration=120
taf.warmup_threads=4

#############################################################################
# TIMING CONTROLS
#############################################################################

taf.db_process_rest_enable=true
taf.db_process_rest_low=6
taf.db_process_rest_high=20

#############################################################################
# REPORT GENERATION
#############################################################################

taf.report_plugin=taf_res_raw_text.pm,text.pm,chart_and_test_info_results_tables_html.pm

#############################################################################
# DATABASE SETTINGS
#############################################################################

# Connect via UNIX socket
taf.db_clients_use_unix_socket=true

# MariaDB config file — TidesDB plugin loaded
taf.db_config_file=./database_config_files/mariadb/mariadb_tidesdb_compare.cnf

# Database data directory
taf.db_data_dir=/data/mariadb

# MariaDB installation directory
taf.db_software_install_dir=/usr/local/mariadb

# *** KEY SETTING: use TidesDB as the storage engine ***
taf.db_engine=TidesDB

#############################################################################
# SYSBENCH-LUA SETTINGS
#############################################################################

# MariaDB connector
sysbench_lua.db_driver=mariadb

# Table configuration — match InnoDB run for fair comparison
sysbench_lua.number_of_rows=1000000
sysbench_lua.number_of_tables=8

# ---------------------------------------------------------------------------
# TidesDB per-table options (passed via --create-table-options to sysbench)
#
# Available options:
#   COMPRESSION='LZ4'           - NONE, SNAPPY, LZ4, ZSTD, LZ4_FAST
#   WRITE_BUFFER_SIZE=134217728 - memtable size in bytes (default 128MB)
#   BLOOM_FILTER=1              - enable bloom filters (0 to disable)
#   BLOOM_FPR=100               - false positive rate (100 = 1%)
#   SYNC_MODE='FULL'            - NONE (fastest), INTERVAL, FULL (safest)
#   ISOLATION_LEVEL='REPEATABLE_READ'
#   USE_BTREE=0                 - 0=block SSTable, 1=B+tree SSTable
# ---------------------------------------------------------------------------
sysbench_lua.create_table_options=SYNC_MODE='NONE' COMPRESSION='LZ4'

# Intermediate results (2 = detailed per-second output)
sysbench_lua.intermediate_result=2

#############################################################################
# SYSBENCH DEBUG
#############################################################################

sysbench_lua.debug_sysbench=false

# TAF debug
taf.tools_debug=true
taf.verbose=true

# PURPOSE:
#     Run sysbench-lua OLTP workloads against MariaDB using the TidesDB
#     storage engine. Provides a ready-to-use configuration for benchmarking
#     TidesDB's insert, point-select, read-only, read-write, and write-only
#     performance.
#
# USAGE:
#     # 1. First build sysbench client (one-time):
#     perl taf.pl --prop=./properties/mariadb/beta/sysbench_lua_tidesdb.properties \
#         --action=setup-client
#
#     # 2. Run the full benchmark (init DB, create tables, run tests):
#     perl taf.pl --prop=./properties/mariadb/beta/sysbench_lua_tidesdb.properties
#
#     # 3. Quick re-run (skip DB init, reuse existing tables):
#     perl taf.pl --prop=./properties/mariadb/beta/sysbench_lua_tidesdb.properties \
#         --skip-test-setup
#
#     # 4. Override thread counts or duration from CLI:
#     perl taf.pl --prop=./properties/mariadb/beta/sysbench_lua_tidesdb.properties \
#         --threads=1,2,4,8 --duration=60
#
# NOTES:
#     - The MariaDB build must include the TidesDB plugin (ha_tidesdb.so).
#     - The TidesDB cnf loads the plugin via plugin_load_add=ha_tidesdb.so.
#     - Adjust taf.db_software_install_dir to point to your MariaDB install.
#############################################################################

#############################################################################
# TAF SETTINGS (GLOBAL)
#############################################################################

## Action: initialize DB, start server, run tests, stop server
taf.action=init-start-db-run-tests

# Skip the running-DB-process check (system MariaDB may be installed)
taf.ignore_running_db_process=true

# Run description
taf.comments="TidesDB sysbench-lua OLTP benchmark"

# Host
taf.host=localhost

#############################################################################
# TEST EXECUTION SETTINGS
#############################################################################

# Duration per thread-count iteration (seconds)
taf.duration=300

# Number of iterations per thread count (for statistical stability)
taf.iterations=3

# Test suite
taf.test_suite=sysbench-lua

# Run type
taf.test_type=adhoc

# Workloads to run:
#   POINT_SELECT   - single-row PK lookups
#   OLTP_RO        - read-only mix (point selects + range scans)
#   OLTP_RW        - read-write mix
#   OLTP_WO        - write-only (INSERT/UPDATE/DELETE)
#   OLTP_INSERT    - pure inserts
taf.tests=POINT_SELECT,OLTP_RO,OLTP_RW,INSERT

# Thread counts to sweep
taf.threads=1,2,4

# Warmup
taf.warmup_duration=120
taf.warmup_threads=4

#############################################################################
# TIMING CONTROLS
#############################################################################

# Sleep X seconds after test setup.
#taf.sleep_after_test_setup=60

# Sleep X seconds after test run.
#taf.sleep_after_test_run=60

# Turns on CPU-based rest detection for the DB process.
taf.db_process_rest_enable=true

# CPU percent at or below this value counts as "rest".
taf.db_process_rest_low=6

# CPU percent at or above this value resets the rest counter (DB not idle).
taf.db_process_rest_high=20

#############################################################################
# REPORT GENERATION
#############################################################################

taf.report_plugin=taf_res_raw_text.pm,text.pm

#############################################################################
# DATABASE SETTINGS
#############################################################################

# Connect via UNIX socket (faster than TCP for local benchmarks)
taf.db_clients_use_unix_socket=true

# MariaDB config file -- loads TidesDB plugin and sets system variables
taf.db_config_file=./database_config_files/mariadb/mariadb_tidesdb.cnf

# Database data directory (where MariaDB stores tables/files)
taf.db_data_dir=/media/agpmastersystem/c794105c-0cd9-4be9-8369-ee6d6e707d68/home/db-bench

# MariaDB installation directory (build tree)
taf.db_software_install_dir=/home/agpmastersystem/server-mariadb-12.1.2/build

# *** KEY SETTING: use TidesDB as the storage engine ***
taf.db_engine=TidesDB

#############################################################################
# SYSBENCH-LUA SETTINGS
#############################################################################

# MariaDB connector
sysbench_lua.db_driver=mariadb

# Table configuration
sysbench_lua.number_of_rows=1000
sysbench_lua.number_of_tables=4

# ---------------------------------------------------------------------------
# TidesDB per-table options (passed via --create-table-options to sysbench)
#
# These become part of the CREATE TABLE statement, e.g.:
#   CREATE TABLE sbtest1 (...) ENGINE=tidesdb SYNC_MODE='NONE' COMPRESSION='LZ4' ...
#
# Available options and defaults:
#   COMPRESSION='LZ4'           - NONE, SNAPPY, LZ4, ZSTD, LZ4_FAST
#   WRITE_BUFFER_SIZE=134217728 - memtable size in bytes (default 128MB)
#   BLOOM_FILTER=1              - enable bloom filters (0 to disable)
#   BLOOM_FPR=100               - false positive rate in parts per 10000 (100 = 1%)
#   SYNC_MODE='FULL'            - NONE (fastest), INTERVAL, FULL (safest)
#   SYNC_INTERVAL_US=128000     - fsync interval in microseconds (INTERVAL mode)
#   ISOLATION_LEVEL='REPEATABLE_READ' - READ_UNCOMMITTED, READ_COMMITTED,
#                                       REPEATABLE_READ, SNAPSHOT, SERIALIZABLE
#   USE_BTREE=0                 - use B+tree SSTable format (0=block, 1=btree)
#   LEVEL_SIZE_RATIO=10         - LSM level size multiplier (2-100)
#   MIN_LEVELS=5                - minimum LSM tree depth (1-64)
#   SKIP_LIST_MAX_LEVEL=12      - memtable skip list height (1-64)
#   SKIP_LIST_PROBABILITY=25    - skip list promotion probability % (1-100)
#   L1_FILE_COUNT_TRIGGER=4     - SSTables at L1 before compaction (1-1024)
#   TTL=0                       - default row TTL in seconds (0 = no expiry)
#   ENCRYPTED=0                 - data-at-rest encryption (0/1)
# ---------------------------------------------------------------------------
sysbench_lua.create_table_options=SYNC_MODE='NONE' COMPRESSION='LZ4'

# Intermediate results (2 = detailed per-second output)
sysbench_lua.intermediate_result=2

#############################################################################
# SYSBENCH DEBUG
#############################################################################

sysbench_lua.debug_sysbench=false

# TAF debug (set to true for verbose framework output)
taf.tools_debug=true
taf.verbose=true
